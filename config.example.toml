[webhook]
url = "https://open.feishu.cn/open-apis/bot/v2/hook/your-webhook-here"
format = "card"

[symbols]
# monitor_list 已废弃 (deprecated)，请使用 single_list + pair_list
single_list = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "HYPEUSDT", "XAUUSDT"]  # ATR Channel 指标
pair_list = ["BTCUSDT/ETHUSDT", "XAUUSDT/XAGUSDT"]                       # Clustering SuperTrend 指标

[atr_1h]
ma_type = "DEMA"      # DEMA, RMA, EMA, SMA, WMA
period = 14
mult = 1.618

[atr_15m]
ma_type = "HMA"       # DEMA, RMA, EMA, SMA, WMA, HMA
period = 14
mult = 1.3

[clustering_st]
min_mult = 1.0        # ATR 倍数范围下界
max_mult = 5.0       # ATR 倍数范围上界
step = 0.5           # ATR 倍数步长
perf_alpha = 10.0    # perf EMA 的平滑系数
from_cluster = "Best"  # 选哪个 cluster: "Best" | "Average" | "Worst"
max_iter = 1000      # K-Means 最大迭代次数
history_klines = 500 # 聚类用 1H K 线历史条数

[service]
heartbeat_file = "heartbeat"
heartbeat_timeout = 120

[proxy]
enable = false
url = "http://127.0.0.1:7890"

[report]
enable = false
times = ["08:00", "20:00"]

[settings]
timezone = "Z"
max_log_lines = 1000
