[webhook]
url = "https://open.feishu.cn/open-apis/bot/v2/hook/your-webhook-here"
format = "card"

[symbols]
monitor_list = ["BTCUSDT", "ETHUSDT", "SOLUSDT", "HYPEUSDT", "ETHUSDT/BTCUSDT"]

[atr_1h]
ma_type = "DEMA"      # DEMA, RMA, EMA, SMA, WMA
period = 14
mult = 1.618

[atr_15m]
ma_type = "HMA"       # DEMA, RMA, EMA, SMA, WMA, HMA
period = 14
mult = 1.3

[service]
heartbeat_file = "heartbeat"
heartbeat_timeout = 120

[proxy]
enable = false
url = "http://127.0.0.1:7890"

[report]
enable = false
times = ["08:00", "20:00"]

[settings]
timezone = "Z"
max_log_lines = 1000
